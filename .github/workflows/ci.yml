name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "22"

jobs:
  lint:
    name: Ruff lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test-core:
    name: Core service (pytest + mypy, PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: orders
          POSTGRES_USER: orders
          POSTGRES_PASSWORD: ci-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U orders -d orders"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 20
    env:
      DB_HOST: localhost
      DB_PORT: "5432"
      POSTGRES_DB: orders
      POSTGRES_USER: orders
      POSTGRES_PASSWORD: ci-password
      REDIS_URL: redis://localhost:6379/0
      DJANGO_SECRET_KEY: ci-only-secret
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            services/core/requirements/*.txt
      - name: Install dependencies (includes compiling the C++ engine)
        run: |
          pip install -r services/core/requirements/dev.txt
          pip install ./native/pickpath ./native/pickpath-native
      - name: Pickpath tests (reference + C++ parity)
        run: python -m pytest native/pickpath/tests -q
      - name: Core test suite (unit + integration + concurrency)
        working-directory: services/core
        run: python -m pytest -q --cov=. --cov-report=term
      - name: mypy
        working-directory: services/core
        run: mypy .
      - name: Benchmark C++ vs Python engine
        run: |
          echo "## Pick-path engine benchmark" >> "$GITHUB_STEP_SUMMARY"
          python native/bench_pickpath.py | tee -a "$GITHUB_STEP_SUMMARY"

  test-realtime:
    name: Realtime service (pytest + mypy, PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: orders
          POSTGRES_USER: orders
          POSTGRES_PASSWORD: ci-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U orders -d orders"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 20
    env:
      RT_DATABASE_URL: postgresql://orders:ci-password@localhost:5432/orders
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: services/realtime/requirements-dev.txt
      - run: pip install -r services/realtime/requirements-dev.txt
      - name: Realtime test suite (unit + LISTEN/NOTIFY integration)
        working-directory: services/realtime
        run: python -m pytest -q
      - name: mypy
        working-directory: services/realtime
        run: mypy app

  frontend:
    name: Frontend (vue-tsc + vitest + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npm run typecheck
      - working-directory: frontend
        run: npm test
      - working-directory: frontend
        run: npm run build
      - uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist

  compose-e2e:
    name: Compose quickstart end-to-end
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Boot the stack exactly as the README quickstart does
        run: |
          cp .env.example .env
          docker compose up -d --build db redis core realtime
      - name: Wait for both services to report healthy
        run: |
          for attempt in $(seq 1 45); do
            core=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8000/healthz || true)
            rt=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8001/healthz || true)
            if [ "$core" = "200" ] && [ "$rt" = "200" ]; then
              echo "healthy after ${attempt} checks"
              exit 0
            fi
            sleep 2
          done
          echo "services never became healthy"
          docker compose logs --tail 100
          exit 1
      - name: Seed demo data
        run: docker compose run --rm core python manage.py seed_data
      - name: Live smoke test (REST order out of the WebSocket)
        run: |
          pip install httpx websockets
          python scripts/smoke_e2e.py
      - name: Tear down
        if: always()
        run: docker compose down -v

  docker-images:
    name: Build images${{ github.ref == 'refs/heads/main' && ' & push to GHCR' || '' }}
    runs-on: ubuntu-latest
    needs: [lint, test-core, test-realtime, frontend, compose-e2e]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Compute lowercase image prefix
        run: echo "IMAGE_PREFIX=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build core image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: services/core/Dockerfile
          target: prod
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/core:latest
            ${{ env.IMAGE_PREFIX }}/core:${{ github.sha }}
          cache-from: type=gha,scope=core
          cache-to: type=gha,scope=core,mode=max
      - name: Build realtime image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: services/realtime/Dockerfile
          target: prod
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/realtime:latest
            ${{ env.IMAGE_PREFIX }}/realtime:${{ github.sha }}
          cache-from: type=gha,scope=realtime
          cache-to: type=gha,scope=realtime,mode=max
      - name: Build frontend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: frontend/Dockerfile
          target: prod
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/frontend:latest
            ${{ env.IMAGE_PREFIX }}/frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
