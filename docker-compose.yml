name: realtime-orders

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-orders}
      POSTGRES_USER: ${POSTGRES_USER:-orders}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev-only-password}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orders} -d ${POSTGRES_DB:-orders}"]
      interval: 2s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 20

  core:
    build:
      context: .
      dockerfile: services/core/Dockerfile
      target: dev
    env_file: .env
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./services/core:/app
      - ./native:/native:ro # parity tests + benchmarks against the built engine
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  realtime:
    build:
      context: .
      dockerfile: services/realtime/Dockerfile
      target: dev
    env_file: .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    volumes:
      - ./services/realtime:/app
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy

  # Vue dev server. Optional profile so backend-only work stays light:
  #   docker compose --profile ui up
  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8000}
      VITE_WS_BASE: ${VITE_WS_BASE:-ws://localhost:8001}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    profiles: ["ui"]

volumes:
  pgdata:
  frontend_node_modules:
